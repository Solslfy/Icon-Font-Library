<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solslfy Icon Font Library</title>
<style>
  :root { color-scheme: dark; --accent:#7c6cff; --bg:#0c0d11; --card:#15171f; --line:#222634; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: radial-gradient(1200px 600px at 50% -200px, #181a26 0%, var(--bg) 60%) fixed; color: #e8e9ed; }
  header { position: sticky; top: 0; z-index: 10; padding: 1.3rem 1.5rem 1rem;
           background: rgba(12,13,17,.86); backdrop-filter: blur(10px);
           border-bottom: 1px solid var(--line); }
  h1 { margin: 0; font-size: 1.4rem; letter-spacing: -.02em; display:flex; align-items:center; gap:.6rem; }
  h1 .badge { font-size:.72rem; font-weight:600; color:#cdb8ff; background:rgba(124,108,255,.16);
              border:1px solid rgba(124,108,255,.35); padding:.15rem .55rem; border-radius:999px; letter-spacing:0; }
  .hint { color:#7b8294; font-size:.82rem; margin:.45rem 0 0; }
  .hint b { color:#aeb4c6; font-weight:600; }
  .controls { display: flex; flex-wrap: wrap; gap: .6rem; margin-top: .95rem; align-items: center; }
  #search { flex: 1 1 260px; min-width: 180px; padding: .65rem .95rem; border-radius: 11px;
            border: 1px solid #2a2e3c; background: #11131a; color: #e8e9ed; font-size: .95rem; }
  #search:focus { outline: none; border-color: var(--accent); box-shadow:0 0 0 3px rgba(124,108,255,.15); }
  .chips { display: flex; flex-wrap: wrap; gap: .4rem; }
  .chip { padding: .35rem .75rem; border-radius: 999px; border: 1px solid #2a2e3c;
          background: #11131a; color: #aab0c4; font-size: .8rem; cursor: pointer; transition: .12s; text-transform:capitalize; }
  .chip:hover { border-color: #4a5170; color: #fff; }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  main { padding: 1.3rem 1.5rem 5rem; max-width: 1500px; margin: 0 auto; }
  .grid { display: grid; gap: .8rem; grid-template-columns: repeat(auto-fill, minmax(124px, 1fr)); }
  figure { position: relative; margin: 0; padding: 1.15rem .55rem .85rem; background: var(--card);
           border: 1px solid var(--line); border-radius: 16px; text-align: center; cursor: pointer;
           transition: transform .14s, border-color .14s, background .14s; }
  figure:hover { background: #1b1e2b; border-color:#3d445f; transform: translateY(-3px); box-shadow:0 10px 30px -12px rgba(0,0,0,.7); }
  .ico { display:grid; place-items:center; height:44px; }
  .ico svg { width: 32px; height: 32px; color: #f2f3f8; }
  figcaption { margin-top: .7rem; font-size: .77rem; word-break: break-word; color: #d4d8e4; }
  figcaption small { display: block; color: #69708a; font-size: .67rem; margin-top: .12rem; }
  .acts { position:absolute; top:7px; right:7px; display:flex; gap:4px; opacity:0; transition:opacity .12s; }
  figure:hover .acts { opacity:1; }
  .act { width:26px; height:26px; border-radius:8px; border:1px solid #2c3142; background:#1f2330;
         color:#aeb4c6; cursor:pointer; display:grid; place-items:center; padding:0; transition:.12s; }
  .act:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
  .act svg { width:14px; height:14px; }
  .empty { color: #69708a; padding: 3.5rem 0; text-align: center; }
  #toast { position: fixed; left: 50%; bottom: 2rem; transform: translateX(-50%) translateY(20px);
           background: var(--accent); color: #fff; padding: .65rem 1.1rem; border-radius: 11px; font-size: .86rem;
           opacity: 0; pointer-events: none; transition: .2s; box-shadow: 0 10px 30px rgba(0,0,0,.5); z-index:20; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header>
  <h1>Solslfy Icon Library <span class="badge">545 icons</span></h1>
  <p class="hint"><b>Click an icon</b> to copy its image link · use the <b>&lt;/&gt;</b> button for SVG code · the <b>↓</b> button to download.</p>
  <div class="controls">
    <input id="search" type="search" placeholder="Search icons…" autocomplete="off">
    <div class="chips" id="styleChips">
      <span class="chip active" data-style="all">all styles</span>
      <span class="chip" data-style="outline">outline</span>
      <span class="chip" data-style="filled">filled</span>
    </div>
  </div>
  <div class="controls"><div class="chips" id="catChips"></div></div>
</header>
<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden>No icons match your filters.</div>
</main>
<div id="toast"></div>

=\"16\" cy=\"18\" r=\"1.2\"/></svg>"}, {"name": "sun", "category": "weather", "style": "filled", "path": "icons/filled/weather/sun.svg", "url": "https://solslfy.github.io/Icon-Font-Library/icons/filled/weather/sun.svg", "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><circle cx=\"12\" cy=\"12\" r=\"5\"/><g fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><line x1=\"12\" y1=\"1.5\" x2=\"12\" y2=\"3.5\"/><line x1=\"12\" y1=\"20.5\" x2=\"12\" y2=\"22.5\"/><line x1=\"1.5\" y1=\"12\" x2=\"3.5\" y2=\"12\"/><line x1=\"20.5\" y1=\"12\" x2=\"22.5\" y2=\"12\"/><line x1=\"4.6\" y1=\"4.6\" x2=\"6\" y2=\"6\"/><line x1=\"18\" y1=\"18\" x2=\"19.4\" y2=\"19.4\"/><line x1=\"4.6\" y1=\"19.4\" x2=\"6\" y2=\"18\"/><line x1=\"18\" y1=\"6\" x2=\"19.4\" y2=\"4.6\"/></g></svg>"}, {"name": "sun-dim", "category": "weather", "style": "filled", "path": "icons/filled/weather/sun-dim.svg", "url": "https://solslfy.github.io/Icon-Font-Library/icons/filled/weather/sun-dim.svg", "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><circle cx=\"12\" cy=\"12\" r=\"5\"/><g fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M12 3.5h.01\"/><path d=\"M20.5 12h.01\"/><path d=\"M12 20.5h.01\"/><path d=\"M3.5 12h.01\"/><path d=\"M18 6h.01\"/><path d=\"M6 18h.01\"/><path d=\"M18 18h.01\"/><path d=\"M6 6h.01\"/></g></svg>"}, {"name": "thermometer", "category": "weather", "style": "filled", "path": "icons/filled/weather/thermometer.svg", "url": "https://solslfy.github.io/Icon-Font-Library/icons/filled/weather/thermometer.svg", "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M9 4a3 3 0 0 1 6 0v9.35a5 5 0 1 1-6 0z\"/></svg>"}, {"name": "umbrella", "category": "weather", "style": "filled", "path": "icons/filled/weather/umbrella.svg", "url": "https://solslfy.github.io/Icon-Font-Library/icons/filled/weather/umbrella.svg", "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2a10 10 0 0 0-10 9 1 1 0 0 0 1 1h8v7a3 3 0 0 1-6 0 1 1 0 0 0-2 0 5 5 0 0 0 10 0v-7h8a1 1 0 0 0 1-1A10 10 0 0 0 12 2z\"/></svg>"}];
const CATEGORIES = ["commerce", "communication", "design", "development", "devices", "files", "gaming", "interface", "media", "navigation", "social", "status", "weather"];
let q = "", styleF = "all", catF = "all";

const ICO_LINK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>';
const ICO_CODE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>';
const ICO_DL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';

const params = new URLSearchParams(location.search);
if (params.get("style") && ["outline","filled"].includes(params.get("style"))) styleF = params.get("style");

const grid = document.getElementById("grid");
const empty = document.getElementById("empty");
const toast = document.getElementById("toast");

const catChips = document.getElementById("catChips");
catChips.innerHTML = '<span class="chip active" data-cat="all">all categories</span>' +
  CATEGORIES.map(c => `<span class="chip" data-cat="${c}">${c}</span>`).join("");

function showToast(msg) {
  toast.textContent = msg; toast.classList.add("show");
  clearTimeout(showToast._t); showToast._t = setTimeout(() => toast.classList.remove("show"), 1500);
}

async function clip(text, msg) {
  try { await navigator.clipboard.writeText(text); showToast(msg); }
  catch { showToast("Clipboard blocked by your browser"); }
}

function iconUrl(item) {
  // Use the address this gallery is actually served from, so the copied link
  // points at wherever it's hosted. Fall back to the known URL when opened locally.
  if (location.protocol === "http:" || location.protocol === "https:")
    return new URL(item.path, document.baseURI).href;
  return item.url;
}
function copyLink(item) { clip(iconUrl(item), `Copied link · ${item.name}`); }
function copyCode(item) { clip(item.svg, `Copied SVG · ${item.name}`); }
function download(item) {
  const blob = new Blob([item.svg], {type: "image/svg+xml"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `${item.name}-${item.style}.svg`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast(`Downloaded ${item.name}.svg`);
}

function render() {
  const matches = ICONS.filter(i =>
    (styleF === "all" || i.style === styleF) &&
    (catF === "all" || i.category === catF) &&
    (q === "" || i.name.includes(q) || i.category.includes(q)));
  grid.innerHTML = "";
  empty.hidden = matches.length > 0;
  const frag = document.createDocumentFragment();
  for (const item of matches) {
    const fig = document.createElement("figure");
    fig.title = `Click to copy image link\n${iconUrl(item)}`;
    fig.innerHTML =
      `<div class="acts">` +
        `<button class="act" data-act="code" title="Copy SVG code">${ICO_CODE}</button>` +
        `<button class="act" data-act="dl" title="Download .svg">${ICO_DL}</button>` +
      `</div>` +
      `<div class="ico">${item.svg}</div>` +
      `<figcaption>${item.name}<small>${item.category} · ${item.style}</small></figcaption>`;
    fig.addEventListener("click", e => {
      const btn = e.target.closest(".act");
      if (!btn) { copyLink(item); return; }
      e.stopPropagation();
      if (btn.dataset.act === "code") copyCode(item);
      else download(item);
    });
    frag.appendChild(fig);
  }
  grid.appendChild(frag);
}

document.getElementById("search").addEventListener("input", e => { q = e.target.value.trim().toLowerCase(); render(); });
document.getElementById("styleChips").addEventListener("click", e => {
  const c = e.target.closest(".chip"); if (!c) return;
  styleF = c.dataset.style;
  [...e.currentTarget.children].forEach(x => x.classList.toggle("active", x === c));
  render();
});
catChips.addEventListener("click", e => {
  const c = e.target.closest(".chip"); if (!c) return;
  catF = c.dataset.cat;
  [...catChips.children].forEach(x => x.classList.toggle("active", x === c));
  render();
});

[...document.getElementById("styleChips").children].forEach(x =>
  x.classList.toggle("active", x.dataset.style === styleF));
render();
</script>
