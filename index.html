<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solslfy Icon Font Library</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 -apple-system, Segoe UI, Roboto, sans-serif;
         background: #0e0f13; color: #e8e9ed; padding: 2rem; }
  h1 { margin: 0 0 .25rem; font-size: 1.6rem; }
  h2 { margin: 2rem 0 1rem; font-size: 1.1rem; color: #9aa0b4;
        text-transform: uppercase; letter-spacing: .08em; }
  .sub { color: #9aa0b4; margin: 0 0 1.5rem; }
  .back { color: #8c7cff; text-decoration: none; display: inline-block; margin-bottom: 1rem; }
  .grid { display: grid; gap: .75rem;
           grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); }
  figure { margin: 0; padding: 1rem .5rem; background: #181a21; border: 1px solid #262935;
            border-radius: 12px; text-align: center; transition: .15s; }
  figure:hover { background: #1f2230; border-color: #3a3f55; transform: translateY(-2px); }
  figure img { width: 28px; height: 28px; color: #e8e9ed; }
  figcaption { margin-top: .6rem; font-size: .78rem; }
  figcaption small { display: block; color: #6b7185; font-size: .68rem; }
</style>
</head>
<body>

<h1>Solslfy Icon Font Library</h1>
<p class="sub">24×24 · currentColor · MIT licensed</p>
